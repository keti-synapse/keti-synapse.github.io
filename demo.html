<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>체험해보기 — NEXUS 관제 콘솔 | SYNAPSE</title>
<!--
  체험해보기 — nexus_ui 통합 관제 콘솔을 백엔드 없이 그대로 재현한 시뮬레이션(단일 파일).
  실제 nexus_ui(index.html + app.js + cockpit.js …)의 디자인(KETI 톤)과 기능을 거의 1:1로 옮겼다:
    · 좌측 사이드바 네비(대시보드 / 플릿 미션 / 맵 에디터 / 서버 설정) + 다크·라이트 테마
    · 사이트 전체(L0) 오버뷰 — 표준맵 카드 + 로봇 dots/요약/리스트 → 맵 진입(L1)
    · 플릿(RTS, L1) — 표준맵 배경 + 90° 회전 + 휠줌/팬, 드래그 박스 다중선택, 방향 화살표,
      roster(신호·배터리·base_state 배지), 미니맵, 3×3 스킬그리드(폴더 드릴다운), capability 파라미터 자동폼
    · 헤더 — 상태요약 칩 + 필터, 알람 🔔(IoT is_alarm + 파생: OFFLINE·저배터리), 비프/TTS
    · 1:1 직접관제 콕핏 — 키보드/마우스 프리셋 탭, 카메라(시뮬), 미니맵, 입력 HUD, 지연(RTT) 그래프, D-pad
    · 플릿 미션 — 템플릿 시작 → DAG 태스크 진행, 서버 설정(연결/테마/ICE/사이트) 패널
  모든 조작은 synapse 표준 command.capability / command.teleop 메시지로 생성되어 콘솔에 찍힌다(개발자도구 확인).
  실제 콘솔과 달리 서버(/api/*)·WebRTC 는 없고, 데이터는 내장 mock + 시뮬레이션 틱으로 돈다.
-->
<script>
  // 데모는 백엔드가 없다 — 설정은 전부 시뮬레이션 기본값. 테마만 localStorage 로 기억.
  (function () {
    window.__NEXUS__ = {
      apiBase: "", poll: 1500, offlineTtl: 5, mapExtent: 16,
      operatorId: "op-demo", iceServers: [{ urls: "stun:stun.l.google.com:19302" }], mapUrl: "",
    };
    if ((localStorage.getItem("nexus_ui.theme") || "dark") === "light")
      document.documentElement.setAttribute("data-theme", "light");
  })();
</script>
<style>
  /* ===== KETI 디자인 토큰 (nexus_ui STYLE.md) — 모든 UI 공통 톤. 다크 기본 + data-theme="light" 토글 ===== */
  :root{                                    /* DARK (기본) — KETI 네이비 + 블루 */
    --bg:#0a0e16; --panel:#0f1722; --card:#0e1620; --card2:#0b121b; --surface:#13243a;
    --line:#1f3a5c; --line2:#2f4f7c;
    --ink:#d6e6f5; --ink2:#9fc0e3; --dim:#7f97b3;
    --accent:#2e9be0; --accent2:#6cc4e8; --on-accent:#04223a;   /* KETI 블루 / 라이트블루 */
    --ok:#2e9be0; --busy:#e3b96f; --err:#e36f6f; --help:#e3d36f; --off:#5a6f88;
    --err-bg:#2a1414; --err-line:#4a2b2b;
  }
  :root[data-theme="light"]{                /* LIGHT — KETI 로고 톤(흰 배경 + 블루) */
    --bg:#f4f8fc; --panel:#ffffff; --card:#ffffff; --card2:#eef4fa; --surface:#e6eef7;
    --line:#d2e0ee; --line2:#bcd0e6;
    --ink:#0a2540; --ink2:#3a5e82; --dim:#6b86a3;
    --accent:#0072ce; --accent2:#0098d8; --on-accent:#ffffff;
    --ok:#0072ce; --busy:#c8881f; --err:#d64545; --help:#b58a00; --off:#9bb0c6;
    --err-bg:#fdecec; --err-line:#f4c9c9;
  }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:var(--bg); color:var(--ink);
    font:13px/1.4 ui-sans-serif,system-ui,"Segoe UI","Apple SD Gothic Neo",sans-serif; user-select:none; overflow:hidden; }
  button{ font:inherit; color:var(--ink); cursor:pointer; }
  #app{ display:flex; flex-direction:column; height:100vh; }
  #app[hidden]{ display:none; }
  header{ padding:6px 12px; border-bottom:1px solid var(--line); display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  header h1{ font-size:14px; margin:0; color:var(--accent); letter-spacing:.5px; white-space:nowrap; }
  header .hint{ color:var(--dim); font-size:11px; }
  header .conn{ font-size:11px; }
  header .conn.ok{ color:var(--ok); } header .conn.bad{ color:var(--err); }
  header .srv{ margin-left:auto; display:flex; gap:4px; align-items:center; font-size:11px; }
  header .srv label{ color:var(--dim); }
  header .srv input{ width:170px; background:var(--card); border:1px solid var(--line); color:var(--ink);
    border-radius:4px; padding:3px 6px; font:11px/1.3 ui-monospace,monospace; }
  header .srv button{ background:var(--accent); color:var(--on-accent); border:none; border-radius:4px; padding:3px 10px; font-weight:600; }
  header #themebtn{ background:var(--card); border:1px solid var(--line); color:var(--ink); border-radius:4px; padding:2px 8px; font-size:13px; line-height:1; }
  header #themebtn:hover{ border-color:var(--accent); }
  header #navtoggle{ background:var(--card); border:1px solid var(--line); color:var(--ink); border-radius:4px; padding:2px 9px; font-size:14px; line-height:1; cursor:pointer; }
  header #navtoggle:hover{ border-color:var(--accent); }
  /* 알람 벨 + 패널 */
  #alarmwrap{ position:relative; }
  #alarmbtn{ background:var(--card); border:1px solid var(--line); color:var(--ink); border-radius:4px; padding:2px 7px; font-size:13px; line-height:1; cursor:pointer; }
  #alarmbtn:hover{ border-color:var(--accent); }
  #alarmbtn #alarmcount{ font:10px/1 ui-monospace,monospace; margin-left:3px; color:var(--dim); }
  #alarmbtn.has{ animation:almpulse 1.1s ease-in-out infinite; }
  #alarmbtn.has #alarmcount{ color:var(--on-accent); background:var(--sev,var(--err)); border-radius:8px; padding:1px 5px; }
  @keyframes almpulse{ 0%,100%{ box-shadow:0 0 0 0 transparent; } 50%{ box-shadow:0 0 0 2px var(--sev,var(--err)); } }
  #alarmpanel{ position:absolute; top:28px; right:0; z-index:30; width:320px; max-height:60vh; overflow:auto;
    background:var(--panel); border:1px solid var(--line); border-radius:8px; box-shadow:0 8px 24px color-mix(in srgb,#000 45%,transparent); padding:8px; }
  #alarmpanel[hidden]{ display:none; }
  .ap-head{ display:flex; align-items:center; gap:10px; margin-bottom:6px; font-size:12px; color:var(--ink); }
  .ap-head b{ flex:1; }
  .ap-tog{ display:flex; align-items:center; gap:3px; font-size:11px; color:var(--ink2); cursor:pointer; }
  .alm{ display:flex; gap:8px; align-items:flex-start; padding:6px 7px; border:1px solid var(--line); border-left-width:3px; border-radius:5px; margin-bottom:5px; background:var(--card); cursor:pointer; }
  .alm:hover{ border-color:var(--accent); }
  .alm .ai{ font-size:14px; }
  .alm .ab{ flex:1; min-width:0; }
  .alm .at{ font-size:12px; color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .alm .as{ font-size:10px; color:var(--dim); margin-top:1px; }
  .alm-none{ color:var(--dim); font-size:12px; padding:8px; text-align:center; }
  /* 좌측 사이드바 네비 */
  #body{ flex:1; display:flex; min-height:0; }
  #sidebar{ width:172px; flex:none; border-right:1px solid var(--line); background:var(--panel);
    padding:8px 6px; display:flex; flex-direction:column; gap:3px; overflow:hidden; transition:width .15s; }
  #app.nav-collapsed #sidebar{ width:46px; }
  .navitem{ display:flex; align-items:center; gap:10px; padding:8px 9px; border-radius:6px; color:var(--ink2);
    text-decoration:none; cursor:pointer; white-space:nowrap; font-size:13px; }
  .navitem:hover{ background:var(--card); color:var(--ink); }
  .navitem.active{ background:color-mix(in srgb, var(--accent) 16%, transparent); color:var(--accent); }

  .navspacer{ flex:1; }
  #app.nav-collapsed .ni-tx{ display:none; }
  #content{ flex:1; display:flex; flex-direction:column; min-height:0; }
  /* 서버 설정 패널 */
  #configview{ flex:1; overflow:auto; padding:18px; }
  #configview[hidden], #overview[hidden], #missionsview[hidden]{ display:none; }
  .cfgwrap{ max-width:660px; }
  .cfgwrap h2{ font-size:16px; color:var(--accent); margin:0 0 14px; }
  .cfg{ border:1px solid var(--line); border-radius:8px; padding:12px 14px; margin-bottom:12px; background:var(--card); }

  .cf input{ width:300px; background:var(--card2); border:1px solid var(--line); color:var(--ink); border-radius:4px; padding:5px 8px; }
  .btn{ background:var(--card); border:1px solid var(--line); color:var(--ink); border-radius:4px; padding:5px 12px; cursor:pointer; font:inherit; }
  .btn:hover{ border-color:var(--accent); }
  .btn.pri{ background:var(--accent); color:var(--on-accent); border:none; font-weight:600; }
  .cfg-status{ font-size:12px; color:var(--dim); margin-top:6px; }
  .cfg-pre{ margin:0; background:var(--card2); border:1px solid var(--line); border-radius:5px; padding:8px;
    font:11px/1.4 ui-monospace,monospace; color:var(--ink2); max-height:170px; overflow:auto; white-space:pre-wrap; }
  /* 상태 요약 칩 */
  #summarybar{ display:flex; gap:5px; align-items:center; }
  .summary-chip{ display:flex; align-items:center; gap:4px; padding:2px 8px; border:1px solid var(--line);
    border-radius:11px; background:var(--card); font-size:11px; color:var(--ink); cursor:pointer; }
  .summary-chip .dot{ width:8px; height:8px; border-radius:50%; }
  .summary-chip.active{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .summary-chip.zero{ opacity:.4; }

  #stage{ flex:1; display:flex; min-height:0; }
  #stage[hidden], #hud[hidden]{ display:none; }
  /* 맵 */
  #map{ position:relative; flex:1; margin:8px; border:1px solid var(--line); border-radius:6px;
    background:
      radial-gradient(circle at 30% 30%, var(--surface), var(--card2) 70%),
      repeating-linear-gradient(0deg,transparent 0 39px,color-mix(in srgb, var(--surface) 50%, transparent) 39px 40px),
      repeating-linear-gradient(90deg,transparent 0 39px,color-mix(in srgb, var(--surface) 50%, transparent) 39px 40px);
    background-size:cover, auto, auto; overflow:hidden; cursor:crosshair; }
  #map.has-map{ background-color:var(--card2); }
  #maprot{ position:absolute; inset:0; transform-origin:center center; }
  #maprot.has-map{ background-color:var(--card2); background-position:center; background-repeat:no-repeat; }
  #maprotbtn{ position:absolute; top:8px; right:8px; z-index:4; background:color-mix(in srgb, var(--bg) 85%, transparent);
    color:var(--ink); border:1px solid var(--line); border-radius:5px; padding:3px 8px; font-size:11px; cursor:pointer; }
  #maprotbtn:hover{ border-color:var(--accent); }
  #mapsel{ position:absolute; top:8px; left:86px; z-index:4; max-width:230px;
    background:color-mix(in srgb, var(--bg) 85%, transparent); color:var(--ink); border:1px solid var(--line);
    border-radius:5px; padding:3px 6px; font:11px/1.3 ui-sans-serif,system-ui; }
  #mapsel:hover{ border-color:var(--accent); }
  #tooverview{ position:absolute; top:8px; left:8px; z-index:4; background:color-mix(in srgb, var(--bg) 85%, transparent);
    color:var(--ink); border:1px solid var(--line); border-radius:5px; padding:3px 8px; font-size:11px; cursor:pointer; }
  #tooverview:hover{ border-color:var(--accent); }
  /* L0 사이트 전체 (overview) */
  #overview{ flex:1; overflow:auto; padding:16px; }
  .ovhead{ display:flex; align-items:baseline; gap:10px; margin-bottom:14px; }
  .ovhead h2{ font-size:16px; color:var(--accent); margin:0; }
  .ovsub{ font-size:12px; color:var(--dim); }
  #overviewgrid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:14px; }
  .ovsite{ grid-column:1/-1; font-size:15px; font-weight:700; color:var(--accent); margin:10px 0 0; padding-bottom:5px; border-bottom:1px solid var(--line); }
  .ovsite:first-child{ margin-top:0; }
  .ovbuilding{ grid-column:1/-1; font-size:12px; color:var(--dim); margin-top:2px; }
  .ovcard{ border:1px solid var(--line); border-radius:8px; background:var(--card); overflow:hidden; cursor:pointer; transition:border-color .1s; }
  .ovcard:hover{ border-color:var(--accent); }
  .ovthumb{ position:relative; width:100%; background:var(--card2) center/contain no-repeat; border-bottom:1px solid var(--line); }
  .ovthumb.nomap{ display:flex; align-items:center; justify-content:center; aspect-ratio:3/2; color:var(--dim); font-size:12px; }
  .ovdot{ position:absolute; width:9px; height:9px; border-radius:50%; transform:translate(-50%,-50%); border:1px solid var(--bg); }
  .ovmeta{ padding:8px 10px; }
  .ovname{ font-size:13px; color:var(--ink); font-weight:600; }
  .ovpath{ font-size:11px; color:var(--dim); margin-top:1px; }
  .ovstats{ display:flex; align-items:center; gap:8px; margin-top:7px; font-size:11px; color:var(--ink2); flex-wrap:wrap; }
  .ovchip{ display:inline-flex; align-items:center; gap:3px; }
  .ovchip .d{ width:8px; height:8px; border-radius:50%; }
  .ovdot.off{ opacity:.4; }
  .ovrobots{ margin-top:8px; border-top:1px solid var(--line); padding-top:6px; }
  .ovrobots-h{ display:flex; align-items:center; gap:5px; font-size:11px; color:var(--dim); cursor:pointer; user-select:none; }
  .ovrobots-h:hover{ color:var(--ink2); }
  .ovrobots-tg{ font-size:9px; width:9px; display:inline-block; }
  .ovrobots-list{ margin-top:5px; display:flex; flex-direction:column; gap:2px; max-height:168px; overflow:auto; }
  .ovrobots.collapsed .ovrobots-list{ display:none; }
  .ovrow{ display:flex; align-items:center; gap:6px; font-size:11px; color:var(--ink2); padding:2px 5px; border-radius:4px; cursor:pointer; }
  .ovrow:hover{ background:var(--card2); color:var(--ink); }
  .ovrow.off{ color:var(--dim); }
  .ovrow-d{ width:8px; height:8px; border-radius:50%; flex:none; }
  .ovrow-id{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .ovrow-s{ font-size:10px; color:var(--dim); }
  .ovrow.empty{ color:var(--dim); cursor:default; } .ovrow.empty:hover{ background:none; }
  .unit.onmap .tag{ opacity:.85; }
  .unit:not(.onmap)::after{ content:"~"; position:absolute; top:-3px; left:-3px; font-size:9px; color:var(--dim); }
  .unit{ position:absolute; width:40px; height:40px; margin:-20px 0 0 -20px; border-radius:8px;
    display:flex; align-items:center; justify-content:center; font-size:20px; cursor:pointer;
    background:var(--card); border:2px solid var(--line); transition:transform .08s, left .3s linear, top .3s linear; z-index:5; }
  .unit:hover{ transform:scale(1.08); }
  .unit .tag{ position:absolute; top:42px; left:50%; transform:translateX(-50%) var(--lblcr,); white-space:nowrap;
    font-size:10px; color:var(--ink2); background:color-mix(in srgb, var(--bg) 80%, transparent); padding:0 3px; border-radius:3px; }
  .unit.sel{ box-shadow:0 0 0 2px var(--accent), 0 0 12px color-mix(in srgb, var(--accent) 40%, transparent); border-color:var(--accent); }
  .unit.off{ opacity:.45; filter:grayscale(.6); }
  .unit .st{ position:absolute; top:-4px; right:-4px; width:10px; height:10px; border-radius:50%; border:1px solid var(--bg); }
  .unit .dir{ position:absolute; width:0; height:0; border-left:4px solid transparent; border-right:4px solid transparent;
    border-bottom:7px solid color-mix(in srgb, var(--ink) 67%, transparent); top:-9px; left:50%; transform-origin:50% 24px; }
  #selbox{ position:absolute; border:1px solid var(--accent); background:color-mix(in srgb, var(--accent) 13%, transparent); display:none; pointer-events:none; z-index:8; }
  /* 우측 roster */
  #roster{ width:178px; margin:8px 8px 8px 0; border:1px solid var(--line); border-radius:6px; padding:6px;
    overflow-y:auto; display:flex; flex-direction:column; gap:5px; }

  .thumb{ display:flex; flex-direction:column; gap:3px; padding:5px 6px; border:1px solid var(--line); border-radius:5px;
    background:var(--card); cursor:pointer; font-size:11px; }
  .thumb:hover{ border-color:var(--line2); }
  .thumb.sel{ border-color:var(--accent); box-shadow:0 0 0 1px var(--accent); }
  .thumb.off{ opacity:.5; }
  .thumb .thr1{ display:flex; align-items:center; gap:6px; }
  .thumb .ic{ font-size:16px; }
  .thumb .nm{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--ink2); }
  /* 상태 배지(신호·배터리·base_state) — roster·사이트 대시보드 공용 */
  .badges{ display:flex; align-items:center; gap:7px; padding-left:1px; }
  .bdg{ display:inline-flex; align-items:center; gap:2px; font-size:10px; color:var(--ink2); line-height:1; }
  .bdg.sig{ gap:3px; } .bdg .ms{ font:9px/1 ui-monospace,monospace; }
  .bdg svg{ display:block; }
  .bat{ gap:3px; } .bat.na{ color:var(--dim); }

  .batshell::after{ content:""; position:absolute; right:-3px; top:3px; width:2px; height:5px; background:var(--ink2); border-radius:0 1px 1px 0; }

  .bstate{ gap:3px; } .bstate .bdot{ width:7px; height:7px; border-radius:50%; }
  /* 하단 HUD */
  #hud{ height:184px; border-top:2px solid var(--line); display:flex; gap:8px; padding:8px;
    background:linear-gradient(var(--card2),var(--bg)); }
  .pane{ border:1px solid var(--line); border-radius:6px; background:var(--card); }
  #minimap{ width:210px; position:relative; }
  #minimap canvas{ width:100%; height:100%; display:block; border-radius:6px; }
  #minimap .lbl{ position:absolute; top:4px; left:6px; font-size:10px; color:var(--dim); }
  #selected{ flex:1; padding:8px; overflow:auto; }
  #selected .lbl{ font-size:10px; color:var(--dim); text-transform:uppercase; }

  #selgrid{ display:flex; flex-wrap:wrap; gap:6px; margin-top:6px; }

  #cmd{ width:240px; padding:8px; display:flex; flex-direction:column; }
  #cmd .lbl{ font-size:10px; color:var(--dim); text-transform:uppercase; display:flex; justify-content:space-between; align-items:center; }
  #cmd .lbl .solo{ color:var(--accent); cursor:pointer; text-transform:none; font-size:11px; }

  .skill{ border:1px solid var(--line); border-radius:5px; background:var(--card2); display:flex; flex-direction:column;

    if (_mapTint.has(key)) { cb(_mapTint.get(key)); return; }
    const im = new Image();
    im.onload = () => {

  // ---- 우클릭 = navigate_to_pose 이동 명령(선택된 모바일 로봇) ----
  function screenToWorld(cx, cy, m) {                 // #map 화면px → 표준맵 world(m). #maprot 변환(translate·rotate·scale) 역적용.
    const im = imageRect(m), rot = STATE.ui.mapRot || 0, v = STATE.ui.mapView, scale = rotRefitScale(im, rot) * (v.zoom || 1);
    let dx = (cx - im.W / 2 - (v.panX || 0)) / scale, dy = (cy - im.H / 2 - (v.panY || 0)) / scale;   // translate·scale 역
    const r = rotVec((4 - rot) % 4, dx, dy);          // rotate 역(균일스케일이라 순서 무관)
    const x2 = r.x + im.W / 2, y2 = r.y + im.H / 2;    // #maprot 좌표(레터박스 공간)
    const px = ((x2 - im.offX) / im.dw) * im.iw, py = ((y2 - im.offY) / im.dh) * im.ih;   // 이미지 px
    return pixelToWorld(px, py, m);
  }
  map.addEventListener("contextmenu", (e) => {
    e.preventDefault();

  // ---- 미니맵 ----
  function minimapGeom(m, cvW, cvH) {
    const rot = STATE.ui.mapRot || 0;
    const ew = rot % 2 ? m.height : m.width, eh = rot % 2 ? m.width : m.height;
    const s = Math.min(cvW / ew, cvH / eh), dispW = ew * s, dispH = eh * s, offX = (cvW - dispW) / 2, offY = (cvH - dispH) / 2;
    const toCanvas = (fx, fy) => { let rfx, rfy; if (rot === 1) { rfx = 1 - fy; rfy = fx; } else if (rot === 2) { rfx = 1 - fx; rfy = 1 - fy; } else if (rot === 3) { rfx = fy; rfy = 1 - fx; } else { rfx = fx; rfy = fy; } return { x: offX + rfx * dispW, y: offY + rfy * dispH }; };
    const toFraction = (cx, cy) => { const rfx = (cx - offX) / dispW, rfy = (cy - offY) / dispH; let fx, fy; if (rot === 1) { fx = rfy; fy = 1 - rfx; } else if (rot === 2) { fx = 1 - rfx; fy = 1 - rfy; } else if (rot === 3) { fx = 1 - rfy; fy = rfx; } else { fx = rfx; fy = rfy; } return { fx, fy }; };
    return { rot, s, dispW, dispH, offX, offY, toCanvas, toFraction };
  }
  let _miniImg = null, _miniUrl = "";
  function renderMinimap() {
    const cv = $("#minimap canvas"); if (!cv) return;
    const r = cv.getBoundingClientRect(); if (!r.width) return;
    cv.width = r.width; cv.height = r.height;
    const g = cv.getContext("2d");
    g.fillStyle = cssVar("--card2"); g.fillRect(0, 0, cv.width, cv.height);
    const m = currentMap(), url = m && mapImgUrl(m);
    if (!(url && m.width && m.height)) {
      _miniUrl = ""; _miniImg = null;

    const t = Date.now(), r = byId(CK.robotId), base = r.network || {};
    const jitter = (b) => b == null ? null : Math.max(5, b + (Math.random() - 0.5) * b * 0.4);
    const add = (k, b) => { const arr = STATE.solo.latency[k]; arr.push({ t, ms: jitter(b), up: b != null }); if (arr.length > RING) arr.shift(); };
    add("server", (base.server || {}).latency_ms || 25); add("internet", (base.internet || {}).latency_ms || 55); add("operator", (base.operator || {}).latency_ms || 32);
    renderChart(); updateLatencyLegend();
  }
  function updateLatencyLegend() {
    if (!CK) return;
    for (const k of ["server", "internet", "operator"]) { const el = CK.els.lat.parentElement.querySelector(`[data-lv="${k}"]`); if (el) el.textContent = last(k) === "–" ? "–" : last(k) + "ms"; }
    const det = $('#cockpit [data-el="latdetail"]'); if (det && !det.hidden) {
      const row = (l, v) => `<div class="latleg"><span>${l}</span><b>${v}</b></div>`;
      det.innerHTML = row("로봇 ↔ 서버", last("server") + "ms") + row("로봇 ↔ 오퍼레이터", last("operator") + "ms") + row("로봇 ↔ 인터넷", last("internet") + "ms") + row("콘솔 ↔ 서버", Math.round(STATE.solo.rtt) + "ms");
    }
  }
  function renderChart() {
    const cv = CK && CK.els.chart; if (!cv) return; const r = cv.getBoundingClientRect(); if (!r.width) return;
    cv.width = r.width; cv.height = r.height; const g = cv.getContext("2d"), W = cv.width, H = cv.height; g.clearRect(0, 0, W, H);
    let max = 50; for (const k of ["server", "internet", "operator"]) for (const p of STATE.solo.latency[k]) if (p.ms != null && p.ms > max) max = p.ms; max = Math.ceil(max / 50) * 50;
    g.strokeStyle = cssVar("--line"); g.lineWidth = 1; for (let i = 1; i < 4; i++) { const y = H * i / 4; g.beginPath(); g.moveTo(0, y); g.lineTo(W, y); g.stroke(); }
    g.fillStyle = cssVar("--dim"); g.font = "9px Consolas"; g.fillText(max + "ms", 2, 9);
    const draw = (k, color, dash) => { const arr = STATE.solo.latency[k]; if (arr.length < 2) return; g.strokeStyle = color; g.lineWidth = 1.4; g.setLineDash(dash); g.beginPath(); let pen = false; const step = W / (RING - 1); arr.forEach((p, i) => { if (p.ms == null) { pen = false; return; } const x = W - (arr.length - 1 - i) * step, y = H - (p.ms / max) * (H - 4) - 2; if (!pen) { g.moveTo(x, y); pen = true; } else g.lineTo(x, y); }); g.stroke(); };
    draw("server", cssVar("--ok"), []); draw("internet", cssVar("--help"), [5, 3]); draw("operator", cssVar("--accent2"), [1, 3]); g.setLineDash([]);
  }
  function drawCam(r, axes) {
    const cv = CK.cam, ctx = cv.getContext("2d");
    const rect = cv.getBoundingClientRect();                 // 매 프레임 self-size(레이아웃 타이밍 무관 — 0폭 방지)
    if (rect.width && (cv.width !== Math.round(rect.width) || cv.height !== Math.round(rect.height))) { cv.width = rect.width; cv.height = rect.height; }
    const w = cv.width, h = cv.height; if (!w) return;
    const lin = axes[1] * (1 + axes[5] * 0.8), turn = (axes[2] - axes[0]) * 1.0, tilt = axes[3];
    const pan = (axes[2]) * 60;                          // 좌우 시점 → 소실점 이동
    CK.camOff += lin * 6;
    const vpx = w / 2 - pan;                              // 소실점 x
    const hz = h * (0.46 + tilt * 0.12);                 // 지평선(틸트 반영)
    // 하늘
    const sky = ctx.createLinearGradient(0, 0, 0, hz); sky.addColorStop(0, "#0c1a2e"); sky.addColorStop(1, "#16314f");
    ctx.fillStyle = sky; ctx.fillRect(0, 0, w, hz);
    // 지면(밝은 surface 톤 → 카메라 느낌)
    const grd = ctx.createLinearGradient(0, hz, 0, h); grd.addColorStop(0, "#1b3552"); grd.addColorStop(1, "#0b1626");
    ctx.fillStyle = grd; ctx.fillRect(0, hz, w, h - hz);
    // 지평선 라인
    ctx.strokeStyle = "rgba(108,196,232,0.55)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, hz); ctx.lineTo(w, hz); ctx.stroke();
    // 지면 가로 격자(전진 시 흐르는 원근선)
    ctx.lineWidth = 1;
    for (let i = 0; i < 18; i++) { let z = ((i * 40 - CK.camOff) % 720 + 720) % 720; const p = z / 720, y = hz + (h - hz) * p * p, a = 0.55 * (1 - p) + 0.08; ctx.strokeStyle = `rgba(108,196,232,${a.toFixed(3)})`; ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke(); }
    // 세로 수렴선(소실점)
    for (let i = -8; i <= 8; i++) { const vx = w / 2 + i * 78 - pan; ctx.strokeStyle = "rgba(108,196,232,0.28)"; ctx.beginPath(); ctx.moveTo(vpx, hz); ctx.lineTo(vx, h); ctx.stroke(); }
    // 장애물(다가오는 박스)
    for (let k = 0; k < 3; k++) { let z = ((k * 240 + 120 - CK.camOff) % 720 + 720) % 720; const p = z / 720, y = hz + (h - hz) * p * p, size = 14 + p * p * 150, x = vpx + (k - 1) * (70 + turn * 26) * (0.3 + p * 1.2); ctx.fillStyle = `rgba(227,${160 - k * 30},111,${(0.35 + 0.5 * p).toFixed(2)})`; ctx.fillRect(x - size / 2, y - size, size, size); ctx.strokeStyle = "rgba(227,185,111,0.8)"; ctx.lineWidth = 1; ctx.strokeRect(x - size / 2, y - size, size, size); }
    // HUD 오버레이(조준선 + REC + 속도)
    ctx.strokeStyle = "rgba(255,255,255,0.35)"; ctx.lineWidth = 1.4; ctx.beginPath(); ctx.arc(w / 2, h / 2, 28, 0, 7); ctx.moveTo(w / 2 - 40, h / 2); ctx.lineTo(w / 2 - 12, h / 2); ctx.moveTo(w / 2 + 12, h / 2); ctx.lineTo(w / 2 + 40, h / 2); ctx.moveTo(w / 2, h / 2 - 40); ctx.lineTo(w / 2, h / 2 - 12); ctx.moveTo(w / 2, h / 2 + 12); ctx.lineTo(w / 2, h / 2 + 40); ctx.stroke();
    ctx.fillStyle = "#e36f6f"; ctx.beginPath(); ctx.arc(16, 18, 5, 0, 7); ctx.fill();
    ctx.fillStyle = "#dceefb"; ctx.font = "11px Consolas"; ctx.fillText("REC · CAM_FRONT", 28, 22);
    ctx.fillText(`v ${(lin * 1.2).toFixed(2)} m/s  ω ${(turn).toFixed(2)} rad/s`, 12, h - 12);
  }
  function resizeCockpit() { if (!CK) return; const cam = CK.cam; const r = cam.parentElement.getBoundingClientRect(); cam.width = r.width; cam.height = r.height; renderChart(); }

  // 콕핏 입력 리스너 (window 단위, 활성 시에만)
  window.addEventListener("keydown", (e) => {
    if (STATE.ui.view !== "solo" || !CK) return;
    if (e.code === "Tab") { e.preventDefault(); setPreset(CK.preset === "keyboard" ? "mouse" : "keyboard"); return; }
    if (["KeyW", "KeyA", "KeyS", "KeyD", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "ShiftLeft", "ShiftRight", "Space"].includes(e.code)) { e.preventDefault(); keys.add(e.code); }
  });
  window.addEventListener("keyup", (e) => { keys.delete(e.code); });
  document.addEventListener("pointerlockchange", () => { if (!CK) return; CK.mouse.locked = document.pointerLockElement === CK.els.main; CK.els.mouselock.hidden = !(CK.preset === "mouse" && !CK.mouse.locked); });
  document.addEventListener("mousemove", (e) => { if (!CK || CK.preset !== "mouse" || !CK.mouse.locked) return; CK.mouse.pan = clamp(CK.mouse.pan + e.movementX * 0.01, -1, 1); CK.mouse.tilt = clamp(CK.mouse.tilt - e.movementY * 0.01, -1, 1); });

  // ===================================================================== 플릿 미션 (시뮬레이션)
  const TEMPLATES = [
    { name: "coffee_delivery", description: "커피 제조 → 운반 → 전달 (DAG)", tasks: [
      { task_id: "brew", robot: "coffee_01", mission: "make_americano" },
      { task_id: "pickup", robot: "arm_01", mission: "gripper_ctrl" },
      { task_id: "deliver", robot: "mobile_01", mission: "navigate_to_pose" }] },
    { name: "patrol_loop", description: "순찰 로봇 2대 경로 루프", tasks: [
      { task_id: "patrol_a", robot: "patrol_03", mission: "navigate_to_waypoint" },
      { task_id: "patrol_b", robot: "agv_02", mission: "navigate_to_waypoint" }] },
    { name: "warehouse_sort", description: "물류 AGV 분류 작업", tasks: [
      { task_id: "fetch", robot: "agv_01", mission: "navigate_to_pose" },
      { task_id: "sort", robot: "agv_02", mission: "navigate_to_waypoint" }] },
  ];
  let RUNS = [], runSeq = 0, missionsTimer = null;
  function buildMissions() {
    const v = $("#missionsview");
    v.innerHTML = `<div class="cfgwrap"><h2>🚩 플릿 미션</h2>
      <section class="cfg"><h3>미션 시작</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
          <select id="nxm-tpl" style="flex:1;min-width:220px;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:6px;padding:7px 9px"></select>
          <button class="btn pri" id="nxm-go">시작</button></div>
        <div id="nxm-hint" style="font-size:12px;color:var(--dim);margin-top:8px"></div></section>
      <section class="cfg"><h3>진행 중 / 최근 런</h3><div id="nxm-runs" style="display:flex;flex-direction:column;gap:10px"></div></section></div>`;
    v.querySelector("#nxm-tpl").innerHTML = TEMPLATES.map((t) => `<option value="${t.name}">${t.name} — ${t.description}</option>`).join("");
    v.querySelector("#nxm-go").onclick = startMission;
    renderRuns();
  }
  function startMission() {
    const name = $("#nxm-tpl").value, tpl = TEMPLATES.find((t) => t.name === name); if (!tpl) return;
    const run = { run_id: "run-" + (++runSeq), name, state: "running", started_at: Date.now(), tasks: {} };
    tpl.tasks.forEach((t, i) => run.tasks[t.task_id] = { ...t, state: "pending", startAt: Date.now() + i * 1800, doneAt: Date.now() + i * 1800 + 1600 });
    RUNS.unshift(run);
    $("#nxm-hint").textContent = `시작됨: ${name}`;
    toast(`🚩 플릿 미션 시작: ${name}`); logline(`FleetMission '${name}' 시작 (DAG)`);
    renderRuns();
  }
  function tickMissions() {
    const now = Date.now(); let changed = false;
    for (const run of RUNS) {
      if (run.state !== "running") continue;
      let allDone = true;
      for (const t of Object.values(run.tasks)) {
        if (t.state === "pending" && now >= t.startAt) { t.state = "running"; changed = true; }
        if (t.state === "running" && now >= t.doneAt) { t.state = "succeeded"; changed = true; const r = byId(t.robot); if (r && r.base_state === "BUSY") r.base_state = "IDLE"; }
        else if (t.state === "running") { const r = byId(t.robot); if (r && r.base_state !== "OFFLINE" && r.base_state !== "ERROR") r.base_state = "BUSY"; }
        if (t.state !== "succeeded" && t.state !== "failed") allDone = false;
      }
      if (allDone) { run.state = "succeeded"; changed = true; logline(`mission_succeeded · ${run.name}`); }
    }
    if (changed && !$("#missionsview").hidden) renderRuns();
  }
  function renderRuns() {
    const el = document.getElementById("nxm-runs"); if (!el) return;
    if (!RUNS.length) { el.innerHTML = '<div style="color:var(--dim)">실행 중인 플릿 미션 없음</div>'; return; }
    const col = { running: "--busy", succeeded: "--ok", failed: "--err", aborted: "--off", pending: "--dim" };
    el.innerHTML = RUNS.slice(0, 12).map((run) => {
      const tasks = Object.values(run.tasks).map((t) => `<span title="${t.robot} · ${t.mission}" style="font-size:11px;padding:2px 8px;border:1px solid var(--line);border-radius:5px"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:var(${col[t.state] || "--dim"});margin-right:5px;vertical-align:middle"></span>${t.task_id}</span>`).join(" ");
      const abort = run.state === "running" ? `<button class="btn" data-abort="${run.run_id}">중단</button>` : "";
      const badge = `<span style="font-size:11px;font-weight:600;padding:2px 9px;border-radius:10px;color:var(--on-accent);background:var(${col[run.state] || "--dim"})">${run.state}</span>`;
      return `<div style="border:1px solid var(--line);border-radius:8px;padding:11px"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:7px"><b>${run.name}</b><span style="display:flex;gap:8px;align-items:center">${badge}${abort}</span></div><div style="display:flex;flex-wrap:wrap;gap:5px">${tasks}</div></div>`;
    }).join("");
    el.querySelectorAll("[data-abort]").forEach((b) => b.onclick = () => { const run = RUNS.find((r) => r.run_id === b.dataset.abort); if (run) { run.state = "aborted"; Object.values(run.tasks).forEach((t) => { if (t.state === "running" || t.state === "pending") t.state = "aborted"; }); renderRuns(); } });
  }

  // ===================================================================== 셸 (사이드바 · 뷰 전환 · 설정)
  function showShellView(v) {
    document.querySelectorAll(".navitem[data-view]").forEach((n) => n.classList.toggle("active", n.dataset.view === v));
    $("#missionsview").hidden = true; if (missionsTimer) { clearInterval(missionsTimer); missionsTimer = null; }
    if (v === "config") { $("#stage").hidden = true; $("#hud").hidden = true; $("#overview").hidden = true; $("#configview").hidden = false; renderConfig(); return; }
    if (v === "missions") { $("#stage").hidden = true; $("#hud").hidden = true; $("#overview").hidden = true; $("#configview").hidden = true; $("#missionsview").hidden = false; buildMissions(); missionsTimer = setInterval(tickMissions, 600); return; }
    $("#configview").hidden = true; updateDashboardLevel();
    if (STATE.ui.level === "map") { render(); renderMinimap(); } else renderOverview();
  }
  function renderConfig() {
    $("#cfgapi").value = ""; $("#cfgpoll").value = cfg.poll; $("#cfgttl").value = cfg.offlineTtl;
    $("#cfgconn").textContent = `◉ 시뮬레이션(서버 없음) · 로봇 ${ROBOTS.length} · 데모`;
    $("#cfgice").textContent = JSON.stringify([{ urls: "stun:stun.l.google.com:19302" }, { urls: "turn:turn.example.org:3478", username: "demo", credential: "•••" }], null, 1);
    $("#cfgsites").textContent = JSON.stringify(MAPS.map((it) => ({ site: it.site, building: it.building, floor: it.floor, map_id: it.map.map_id })), null, 1);
  }
  function toggleTheme() {
    const toLight = document.documentElement.getAttribute("data-theme") !== "light";
    if (toLight) document.documentElement.setAttribute("data-theme", "light"); else document.documentElement.removeAttribute("data-theme");
    localStorage.setItem("nexus_ui.theme", toLight ? "light" : "dark");
    const tb = $("#themebtn"); if (tb) tb.textContent = toLight ? "☀" : "◐";
    _mapTint.clear(); _miniUrl = "";   // 테마 톤 맵 캐시 무효화
    if (STATE.ui.view === "solo") { renderChart(); renderCockpitMinimap(); }
    else if (STATE.ui.level === "overview" && $("#overview").hidden === false) renderOverview();
    else { renderMap(); renderMinimap(); }
  }
  function setupShell() {
    const app = $("#app");
    if (localStorage.getItem("nexus_demo.navCollapsed") === "1") app.classList.add("nav-collapsed");
    $("#navtoggle").addEventListener("click", () => { app.classList.toggle("nav-collapsed"); localStorage.setItem("nexus_demo.navCollapsed", app.classList.contains("nav-collapsed") ? "1" : "0"); setTimeout(renderMinimap, 170); });
    document.querySelectorAll(".navitem[data-view]").forEach((it) => it.addEventListener("click", () => showShellView(it.dataset.view)));
    $("#navmapeditor").addEventListener("click", (e) => { e.preventDefault(); toast("맵 에디터는 실제 NEXUS 콘솔에서 제공됩니다 (데모 제외)"); });
    $("#themebtn").addEventListener("click", toggleTheme);
    $("#themebtn").textContent = document.documentElement.getAttribute("data-theme") === "light" ? "☀" : "◐";
    $("#cfgtheme").addEventListener("click", toggleTheme);
    $("#cfgapply").addEventListener("click", () => toast("데모 — 서버 설정은 시뮬레이션에서 적용되지 않습니다"));
    // 서버 입력(데모)
    $("#srvgo").addEventListener("click", () => toast("데모 — 서버 연결 없이 동작하는 시뮬레이션입니다"));
    $("#srvurl").addEventListener("keydown", (e) => { if (e.key === "Enter") toast("데모 — 서버 연결 없이 동작하는 시뮬레이션입니다"); });
    // 맵 셀렉터
    const ms = $("#mapsel");
    ms.innerHTML = ['<option value="">맵 없음(추상 그리드)</option>'].concat(MAPS.map((it) => `<option value="${it.map.map_id}">${esc(it.site)}·${esc(it.building)}·${esc(it.floor)} — ${esc(it.map.map_id)}</option>`)).join("");
    ms.addEventListener("change", () => { STATE.ui.mapId = ms.value || null; if (STATE.ui.level === "map") renderMap(); });
    $("#tooverview").addEventListener("click", backToOverview);
    $("#maprotbtn").addEventListener("click", () => { STATE.ui.mapRot = ((STATE.ui.mapRot || 0) + 1) % 4; STATE.ui.mapView = { zoom: 1, panX: 0, panY: 0 }; renderMap(); });
    // 미니맵 클릭/드래그
    const mmcv = $("#minimap canvas"); let mmdrag = false; mmcv.style.cursor = "pointer";
    mmcv.addEventListener("mousedown", (e) => { mmdrag = true; minimapNav(e); });
    window.addEventListener("mousemove", (e) => { if (mmdrag) minimapNav(e); });
    window.addEventListener("mouseup", () => { mmdrag = false; });
    // 알람 패널
    const ab = $("#alarmbtn"), ap = $("#alarmpanel");
    ab.addEventListener("click", (e) => { e.stopPropagation(); ap.hidden = !ap.hidden; if (window.__ac && window.__ac.state === "suspended") window.__ac.resume(); });
    document.addEventListener("click", (e) => { if (!ap.hidden && !$("#alarmwrap").contains(e.target)) ap.hidden = true; });
    const mute = $("#almmute"), tts = $("#almtts");
    mute.checked = localStorage.getItem("nexus_demo.almMute") === "1"; mute.addEventListener("change", () => localStorage.setItem("nexus_demo.almMute", mute.checked ? "1" : "0"));
    tts.checked = localStorage.getItem("nexus_demo.almTts") === "1"; tts.addEventListener("change", () => localStorage.setItem("nexus_demo.almTts", tts.checked ? "1" : "0"));
  }
  window.addEventListener("resize", () => { if (STATE.ui.view === "solo") resizeCockpit(); else { renderMinimap(); if (STATE.ui.mapId && STATE.ui.level === "map") renderMap(); } });

  // ===================================================================== SIM TICK
  let tick = 0;
  function step() {
    tick++;
    const dt = 1;
    for (const r of ROBOTS) {
      if (r.base_state === "OFFLINE") continue;
      // 콕핏 조종 로봇
      if (CK && r.robot_id === CK.robotId) {
        const { ax, bt } = gatherInput(); CK.axes = ax; CK.buttons = bt;
        const stop = bt[1] > 0;
        const lin = stop ? 0 : ax[1] * (1 + ax[5] * 0.8) * 0.12, ang = stop ? 0 : (-ax[0]) * 0.06;
        r.vel = { l: lin, a: ang };
        r.pose.theta += ang; r.pose.x += Math.cos(r.pose.theta) * lin; r.pose.y += Math.sin(r.pose.theta) * lin;
        clampPose(r);
        if (lin || ang) r.battery.percentage = Math.max(0, (r.battery.percentage ?? 50) - 0.02);
        continue;
      }
      // busy 타임아웃
      if (r.busyUntil && Date.now() > r.busyUntil && r.base_state === "BUSY" && !r.target) { r.base_state = "IDLE"; r.busyUntil = 0; }
      // navigate target (world meters)
      if (r.target) {
        const dx = r.target.x - r.pose.x, dy = r.target.y - r.pose.y, d = Math.hypot(dx, dy);
        if (d < 0.3) { r.pose.x = r.target.x; r.pose.y = r.target.y; r.target = null; r.base_state = "IDLE"; }
        else { const sp = Math.min(0.22, d * 0.12); r.pose.x += dx / d * sp; r.pose.y += dy / d * sp; r.pose.theta = Math.atan2(dy, dx); }
        clampPose(r);
        if (r.battery && r.battery.percentage != null) r.battery.percentage = Math.max(0, r.battery.percentage - 0.01);
      }
    }
    // 콕핏 렌더
    if (CK) { drawCam(byId(CK.robotId), CK.axes); updateInputHUD(CK.axes, CK.buttons); if (tick % 3 === 0) { renderCockpitStatus(); renderCockpitMinimap(); } if (tick % 4 === 0) pushLatency(); }
    // 플릿 렌더(맵 표시 중) — 유닛은 위치만 갱신(DOM 재생성 X → 클릭/transition 유지)
    if (STATE.ui.view !== "solo") {
      if (STATE.ui.level === "map" && !$("#stage").hidden) { positionUnits(); }
      if (tick % 8 === 0) { renderSummary(); renderConn(); renderAlarms(); if (STATE.ui.level === "map" && !$("#hud").hidden) { renderRoster(); renderSelected(); renderMinimap(); } else if (STATE.ui.level === "overview" && !$("#overview").hidden) renderOverview(); }
    }
    // 콘솔↔서버 RTT 시뮬
    STATE.solo.rtt = clamp(STATE.solo.rtt + (Math.random() - 0.5) * 4, 14, 60);
  }
  function clampPose(r) { const m = mapById(r.standardMapId); if (!m) return; const mw = m.width * m.resolution, mh = m.height * m.resolution; r.pose.x = clamp(r.pose.x, 0.5, mw - 0.5); r.pose.y = clamp(r.pose.y, 0.5, mh - 0.5); }

  // ===================================================================== BOOT
  setupShell();
  updateDashboardLevel();
  renderDashboard();
  logline("NEXUS 관제 콘솔 — 시뮬레이션 시작 · 로봇 11대 등록");
  setInterval(step, 90);
})();
</script>
